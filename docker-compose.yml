version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: pitchflow-backend
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      FRONTEND_URL: http://localhost:3001

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8002
    container_name: pitchflow-frontend
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
    depends_on:
      - backend
